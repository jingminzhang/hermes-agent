name: Sync to Codeup

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main

      - name: Reset and sync to Codeup
        run: |
          git config user.name "Houzhong Xu"
          git config user.email "ben@git4ta.fun"
          git checkout main
          git reset --hard upstream/main
          CODEUP_URL="https://houzhongxu:${{ secrets.CODEUP_PAT }}@codeup.aliyun.com/698053416ec1ba182dc6e452/hermes-agent.git"
          git push --force "$CODEUP_URL" main
          git commit --allow-empty -m "sync: upstream code synced to Codeup"
          git push "$CODEUP_URL" main
